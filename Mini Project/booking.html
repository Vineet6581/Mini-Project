<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <section class="book" id="book">
        <h1 class="heading"><span>BOOKNOW</span></h1>
        <br />
        <div class="row">
        <div class="form">
            <form action="index.html">
                <div class="inputBox">
                    <h3><i class="name"></i> Enter your name </h3>
                    <input type="text" placeholder="e.g.vineet chaudhary">
                </div>
                <div class="inputBox">
                    <h3><i class="fas fa-user-friends"></i> Enter your email id </h3>
                    <input type="email" placeholder="e.g.xyz123@gmail.com">
                </div>
                <div class="inputBox">
                    <h3><i class="count"></i> No of Persons </h3>
                    <input type="number" placeholder="Number of Guests">
                </div>
                <div class="inputBox">
                    <h3><i class="phone"></i> Phone No </i></h3>
                    <input type="number" placeholder="Contact Number">
                </div>
                <div class="inputBox">
                    <h3><i class="arrival"></i> Arrival Date </h3>
                    <input type="date">
                </div>
                <div class="inputBox">
                    <h3><i class="departure"></i> Departure Date </h3>
                    <input type="date">
                </div>
                <input type="submit" class="btn" value="Book Now">
            </form>
        </div>
        </div>
    </section>
</body>
</html>
